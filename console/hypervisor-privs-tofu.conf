# Proxmox privileges granted to the OpenTofu service account role.
# One privilege per line. Blank lines and lines starting with # are ignored.
# Changes take effect the next time "Setup -> OpenTofu service account" is run.
# Existing roles in Proxmox are left unchanged — delete the role and re-run
# Setup to apply updates.
#
# This role is granted cluster-wide (/) because Sys.Modify — required for
# cluster firewall security groups — has no narrower ACL path. Remove
# Sys.Audit and Sys.Modify from the role in Proxmox if you do not manage
# cluster firewall rules in OpenTofu.
#
# Full privilege reference:
#   https://pve.proxmox.com/wiki/User_Management#pveum_permission_management

