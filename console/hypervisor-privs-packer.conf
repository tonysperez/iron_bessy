# Proxmox privileges granted to the Packer service account role.
# One privilege per line. Blank lines and lines starting with # are ignored.
# Changes take effect the next time "Setup -> Packer service account" is run.
# Existing roles in Proxmox are left unchanged — delete the role and re-run
# Setup to apply updates.
#
# These are scoped per-resource via ACLs (storage / pool / SDN zone) so the
# role itself can be broad without granting cluster-wide access.
#
